name: base-conhecimento
category: suporte
version: 0.2.0
status: estavel
priority: opcional

depends_on: []

composes_with:
  - suporte/faq-tecnico
  - conhecimento/mapa-conhecimento

inputs:
  - name: conteudo_atual
    type: list
    required: true
    description: Conteudo atual da base.
  - name: categoria
    type: object
    required: true
    description: Taxonomia proposta.
  - name: dono
    type: object
    required: true
    description: Donos por categoria.
  - name: ciclo_revisao
    type: string
    required: true
    description: "Ciclo de revisao (ex.: trimestral)."

outputs:
  - name: taxonomia_markdown
    type: markdown
    required: true
    description: Taxonomia proposta.
  - name: itens_vencidos
    type: list
    required: true
    description: Itens com revisao vencida.
  - name: recomendacoes
    type: list
    required: true
    description: Recomendacoes de organizacao.