name: analise-planilha
category: produtividade
version: 0.2.0
status: estavel
priority: essencial

depends_on:
  - produtividade/extrator-dados

composes_with:
  - gestao/dashboard-executivo
  - gestao/kpi-okr

inputs:
  - name: dados
    type: string
    required: true
    description: Caminho dos dados (CSV/Excel).
  - name: foco
    type: string
    required: true
    description: Questao de analise.
  - name: publico
    type: string
    required: true
    description: Publico-alvo.
  - name: profundidade
    type: enum
    required: true
    enum_values: [basica, media, avancada]
    description: Nivel de profundidade.

outputs:
  - name: analise_markdown
    type: markdown
    required: true
    description: Analise com estatisticas, tendencias, outliers, insights.
  - name: insights
    type: list
    required: true
    description: Lista de insights acionaveis.
  - name: recomendacoes
    type: list
    required: true
    description: Recomendacoes praticas.