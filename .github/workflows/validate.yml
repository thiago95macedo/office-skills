name: validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  structure:
    name: Validar estrutura das Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validar biblioteca completa
        run: bash scripts/validate.sh

  lint:
    name: Lint de YAMLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar todos os schema.yaml
        run: python3 scripts/validate-contracts.py

      - name: Validar todos os fluxos
        run: python3 scripts/validate-flows.py